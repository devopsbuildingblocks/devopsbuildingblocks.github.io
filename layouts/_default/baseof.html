<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="page-{{ .Kind }}{{ with .Type }} type-{{ . }}{{ end }}">
  <div class="site-bg-blocks" aria-hidden="true"></div>
  {{- partial "nav.html" . -}}
  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
