{{ define "main" }}
<div class="container container--til">
  <article class="post post--til">
    <header class="post-header">
      <div class="post-header-meta">
        <a href="/til/" class="post-back">← TIL</a>
      </div>
      <h1 class="post-title">{{ .Title }}</h1>
      {{ with .Description }}<p class="post-desc">{{ . }}</p>{{ end }}
      {{ partial "post-meta.html" . }}
    </header>
    <div class="post-body">
      {{ .Content }}
    </div>
    <footer class="post-footer">
      {{ partial "post-authors.html" . }}
    </footer>
  </article>
</div>
{{ end }}
