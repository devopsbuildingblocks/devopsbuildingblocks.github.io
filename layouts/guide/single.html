{{ define "main" }}
<div class="container container--guide">
  <div class="guide-layout">
    <article class="post post--guide">
      <header class="post-header">
        <div class="post-header-meta">
          <a href="/guides/" class="post-back">← Guides</a>
        </div>
        <h1 class="post-title">{{ .Title }}</h1>
        {{ with .Description }}<p class="post-desc">{{ . }}</p>{{ end }}
        {{ partial "post-meta.html" . }}
        {{ partial "post-authors.html" . }}
      </header>
      <div class="post-body">
        {{ .Content }}
      </div>
      <footer class="post-footer">
        {{ with .GitInfo }}
        <p class="post-updated">Last updated: <time datetime="{{ .AuthorDate.Format "2006-01-02" }}">{{ .AuthorDate.Format "Jan 2, 2006" }}</time></p>
        {{ end }}
      </footer>
    </article>
    <aside class="guide-toc-sidebar">
      {{ partial "toc.html" . }}
    </aside>
  </div>
</div>
{{ end }}
