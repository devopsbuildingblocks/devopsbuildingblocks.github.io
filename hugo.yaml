baseURL: "https://devopsbuildingblocks.com/"
languageCode: "en-us"
title: "DevOps Building Blocks"

contentDir: "content"
layoutDir: "layouts"
staticDir: "static"

enableRobotsTXT: true
enableGitInfo: false

markup:
  highlight:
    noClasses: false
    lineNos: false
    codeFences: true
    guessSyntax: false
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  topic: "topics"

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]
  term: ["HTML"]
  taxonomy: ["HTML"]

rssLimit: 20

params:
  author: "Joshua Ward"
  description: "Guides, articles, and hard-won lessons from the DevOps trenches."
  logoSquare: "/img/db2-logo-square.png"
  logoRound: "/img/db2-logo-round.png"
  profilePhoto: "/img/joshuaward.jpg"
